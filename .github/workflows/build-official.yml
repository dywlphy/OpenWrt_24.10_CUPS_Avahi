# ============================================================
# OpenWrt 官方 24.10 稳定版编译
# 核心：CUPS + SSR-Plus + ksmbd
# 三层快速失败检查（5分钟内发现配置/下载问题）
# ============================================================

name: Build Official OpenWrt

on:
  workflow_dispatch:

env:
  UPLOAD_BIN_DIR: false
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
    - name: Checkout
      uses: actions/checkout@main

    - name: Initialization environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
        sudo docker image prune --all --force
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev python3 python3-pip python3-ply python3-setuptools rsync swig unzip zlib1g-dev file wget cpio rsync unzip file libelf-dev libfuse-dev libpam0g-dev libzstd-dev cups libcups2-dev
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo timedatectl set-timezone Asia/Shanghai

    - name: Clone OpenWrt 24.10
      run: |
        git clone https://github.com/openwrt/openwrt -b openwrt-24.10 openwrt

    - name: Load custom feeds and config
      run: |
        cp config.txt openwrt/.config
        cp diy-part1.sh openwrt/
        cp diy-part2.sh openwrt/
        chmod +x openwrt/diy-part1.sh openwrt/diy-part2.sh
        cd openwrt
        ./diy-part1.sh
        ./diy-part2.sh
        make defconfig

    - name: Update feeds
      run: cd openwrt && ./scripts/feeds update -a

    - name: Install feeds
      run: cd openwrt && ./scripts/feeds install -a

    - name: Remove conflicting packages
      run: |
        cd openwrt
        rm -rf feeds/packages/net/onionshare-cli 2>/dev/null || true
        find . -name "onionshare-cli" -type d -exec rm -rf {} \; 2>/dev/null || true
        for idx in feeds/*.index; do
          [ -f "$idx" ] && sed -i '/onionshare-cli/d' "$idx" || true
        done
        rm -rf tmp/
        echo "✅ 冲突包已清除"

    # ═══════════════════════════════════════
    # 第一道检查：feeds 中的包是否存在
    # ═══════════════════════════════════════
    - name: Verify package requirements
      run: |
        cd openwrt
        
        echo ""
        echo "╔══════════════════════════════════════╗"
        echo "║  🔍 第一道检查：包是否存在           ║"
        echo "╚══════════════════════════════════════╝"
        echo ""
        FAIL=0
        
        check_pkg() {
          local desc="${2:-}"
          if grep -q "CONFIG_PACKAGE_$1=y" .config; then
            if grep -rq "^Package:.*$1" feeds/ package/ 2>/dev/null; then
              echo "  ✅ $1 ${desc:+($desc)}"
            else
              echo "  ❌ $1 ${desc:+($desc)} - 在任何 feed 中都不存在！"
              FAIL=1
            fi
          fi
        }
        
        echo "【核心网络】"
        check_pkg "uhttpd" "Web管理界面"
        check_pkg "dnsmasq-full" "DNS/DHCP"
        check_pkg "odhcpd" "IPv6分配"
        check_pkg "firewall4" "防火墙"
        check_pkg "nftables" "防火墙后端"
        check_pkg "miniupnpd" "UPnP服务"
        echo ""
        
        echo "【CUPS 打印系统】"
        check_pkg "cupsd" "CUPS守护进程"
        check_pkg "cups" "CUPS核心"
        check_pkg "cups-filters" "打印过滤器"
        check_pkg "ghostscript" "PostScript解释器"
        check_pkg "gutenprint" "打印机驱动"
        check_pkg "foomatic-db" "打印机数据库"
        check_pkg "foomatic-db-engine" "打印机引擎"
        check_pkg "cups-bjnp" "Canon网络打印"
        check_pkg "avahi-daemon" "打印机发现"
        check_pkg "libjpeg-turbo" "JPEG支持"
        check_pkg "libpng" "PNG支持"
        check_pkg "libfreetype" "字体渲染"
        check_pkg "fontconfig" "字体配置"
        check_pkg "libtiff" "TIFF支持"
        check_pkg "lcms2" "色彩管理"
        check_pkg "libdaemon" "守护进程库"
        check_pkg "libdbus" "D-Bus"
        check_pkg "libexpat" "XML解析"
        check_pkg "gnutls" "TLS支持"
        check_pkg "libusb-1.0" "USB支持"
        check_pkg "dbus" "D-Bus守护进程"
        echo ""
        
        echo "【文件共享】"
        check_pkg "ksmbd-server" "SMB共享服务"
        check_pkg "luci-app-ksmbd" "共享管理界面"
        echo ""
        
        echo "【科学上网】"
        check_pkg "luci-app-ssr-plus" "SSR-Plus界面"
        echo ""
        
        echo "【远程接入】"
        check_pkg "wireguard-tools" "WireGuard工具"
        check_pkg "luci-proto-wireguard" "WireGuard界面"
        echo ""
        
        echo "【实用功能】"
        check_pkg "luci-app-sqm" "SQM QoS"
        check_pkg "sqm-scripts" "SQM脚本"
        check_pkg "luci-app-upnp" "UPnP界面"
        check_pkg "luci-app-ddns" "动态DNS"
        check_pkg "luci-app-wol" "网络唤醒"
        check_pkg "luci-app-nlbwmon" "流量监控"
        check_pkg "luci-app-statistics" "系统统计"
        check_pkg "luci-app-adblock" "广告过滤"
        check_pkg "luci-app-nft-qos" "上网时间控制"
        check_pkg "luci-app-autoreboot" "定时重启"
        check_pkg "luci-app-watchcat" "断线重启"
        check_pkg "luci-app-commands" "命令执行"
        check_pkg "luci-app-usb-printer" "USB打印界面"
        check_pkg "luci-app-diskman" "磁盘管理"
        check_pkg "vlmcsd" "KMS激活服务"
        check_pkg "luci-app-vlmcsd" "KMS激活界面"
        check_pkg "iperf3" "测速工具"
        check_pkg "htop" "进程查看"
        check_pkg "curl" "URL工具"
        check_pkg "bash" "Bash Shell"
        check_pkg "block-mount" "自动挂载"
        echo ""
        
        if [ "$FAIL" -eq 1 ]; then
          echo "╔══════════════════════════════════════╗"
          echo "║  ❌ 第一道检查失败                   ║"
          echo "║  有包在 feeds 中不存在               ║"
          echo "║  可能原因：                          ║"
          echo "║  1. 包名拼写错误                     ║"
          echo "║  2. 缺少对应的 feed 源               ║"
          echo "║  3. feed 分支与 OpenWrt 版本不匹配    ║"
          echo "╚══════════════════════════════════════╝"
          exit 1
        fi
        
        echo "╔══════════════════════════════════════╗"
        echo "║  ✅ 第一道检查通过                   ║"
        echo "║  ⏳ 即将开始下载...                   ║"
        echo "╚══════════════════════════════════════╝"

    - name: Download packages
      run: cd openwrt && make download -j8 || make download -j1 V=s

    # ═══════════════════════════════════════
    # 第二道检查：下载是否完整
    # ═══════════════════════════════════════
    - name: Verify downloads
      run: |
        cd openwrt
        
        echo ""
        echo "╔══════════════════════════════════════╗"
        echo "║  🔍 第二道检查：下载完整性           ║"
        echo "╚══════════════════════════════════════╝"
        echo ""
        
        FAIL=0
        
        check_dl() {
          local desc="${2:-}"
          if ls dl/$1* 2>/dev/null | head -1 | grep -q .; then
            echo "  ✅ $1 ${desc:+($desc)}"
          else
            echo "  ❌ $1 ${desc:+($desc)} - 未下载！"
            FAIL=1
          fi
        }
        
        echo "【核心组件】"
        check_dl "uhttpd" "Web管理"
        check_dl "dnsmasq" "DNS/DHCP"
        check_dl "dropbear" "SSH服务"
        check_dl "mbedtls" "加密库"
        echo ""
        
        echo "【CUPS 打印系统】"
        check_dl "cups" "CUPS核心"
        check_dl "cups-filters" "打印过滤器"
        check_dl "ghostscript" "PostScript"
        check_dl "gutenprint" "打印机驱动"
        check_dl "foomatic-db" "打印机数据库"
        check_dl "avahi" "打印机发现"
        echo ""
        
        echo "【文件共享】"
        check_dl "ksmbd" "SMB共享"
        echo ""
        
        echo "【实用工具】"
        check_dl "wireguard-tools" "WireGuard"
        check_dl "vlmcsd" "KMS激活"
        check_dl "curl" "URL工具"
        echo ""
        
        if [ "$FAIL" -eq 1 ]; then
          echo "╔══════════════════════════════════════╗"
          echo "║  ❌ 第二道检查失败                   ║"
          echo "║  有源码包下载缺失                    ║"
          echo "║  可能原因：                          ║"
          echo "║  1. 下载源 URL 失效                  ║"
          echo "║  2. 网络连接问题                     ║"
          echo "║  3. 源码包名称变更                   ║"
          echo "╚══════════════════════════════════════╝"
          exit 1
        fi
        
        echo "╔══════════════════════════════════════╗"
        echo "║  ✅ 第二道检查通过                   ║"
        echo "║  ⏳ 即将开始编译...                   ║"
        echo "╚══════════════════════════════════════╝"

    - name: Compile firmware
      id: compile
      run: |
        cd openwrt
        echo -e "$(nproc) thread compile"
        make -j$(nproc) || make -j8 || make -j1 V=s
        echo "status=success" >> $GITHUB_OUTPUT
        grep '^CONFIG_TARGET.*DEVICE.*=y' .config | sed -r 's/.*DEVICE_(.*)=y/\1/' > DEVICE_NAME
        [ -s DEVICE_NAME ] && echo "DEVICE_NAME=_$(cat DEVICE_NAME)" >> $GITHUB_ENV
        echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV

    - name: Organize files
      id: organize
      if: env.UPLOAD_FIRMWARE == 'true' && !cancelled()
      run: |
        cd openwrt/bin/targets/*/*
        rm -rf packages
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Upload firmware to Artifacts
      uses: actions/upload-artifact@main
      if: steps.organize.outputs.status == 'success' && !cancelled()
      with:
        name: OpenWrt_Official_firmware${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
        path: ${{ env.FIRMWARE }}

    - name: Generate release tag
      id: tag
      if: env.UPLOAD_RELEASE == 'true' && !cancelled()
      run: |
        echo "release_tag=$(date +"%Y.%m.%d-%H%M")" >> $GITHUB_OUTPUT
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Upload firmware to Release
      uses: softprops/action-gh-release@master
      if: steps.tag.outputs.status == 'success' && !cancelled()
      with:
        token: ${{ secrets.RELEASES_TOKEN }}
        tag_name: ${{ steps.tag.outputs.release_tag }}
        files: ${{ env.FIRMWARE }}/*

    - name: Remove old Releases
      uses: dev-drprasad/delete-older-releases@master
      if: env.UPLOAD_RELEASE == 'true' && !cancelled()
      with:
        keep_latest: 3
        delete_tags: true
      env:
        GITHUB_TOKEN: ${{ secrets.RELEASES_TOKEN }}
