# ============================================================
# OpenWrt 官方 24.10 稳定版编译
# 核心：CUPS + SSR-Plus + ksmbd
# ============================================================

name: Build Official OpenWrt

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
    - name: Checkout
      uses: actions/checkout@main

    - name: Initialization environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
        sudo docker image prune --all --force
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev python3 python3-pip python3-ply python3-setuptools rsync swig unzip zlib1g-dev file wget cpio rsync unzip file libelf-dev libfuse-dev libpam0g-dev libzstd-dev
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo timedatectl set-timezone Asia/Shanghai

    - name: Clone OpenWrt 24.10
      run: |
        git clone https://github.com/openwrt/openwrt -b openwrt-24.10 openwrt

    - name: Load custom feeds and config
      run: |
        chmod +x diy-part1.sh diy-part2.sh
        cp config.txt openwrt/.config
        cd openwrt
        ../diy-part1.sh
        ../diy-part2.sh

    - name: Update feeds
      run: cd openwrt && ./scripts/feeds update -a

    - name: Install feeds
      run: cd openwrt && ./scripts/feeds install -a

    - name: Download packages
      run: cd openwrt && make download -j8 || make download -j1 V=s

    - name: Compile firmware
      run: |
        cd openwrt
        make -j$(nproc) || make -j1 V=s

    - name: Upload firmware
      uses: actions/upload-artifact@main
      with:
        name: OpenWrt_Official_24.10
        path: openwrt/bin/targets/x86/64/
